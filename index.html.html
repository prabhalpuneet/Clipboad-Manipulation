<!DOCTYPE html>
<html>
<head>
    <title>Clipboard Hacking Demo</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            width: 80%;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 28px;
            margin-bottom: 20px;
            color: #00ffcc;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-top: 10px;
            font-size: 16px;
            resize: none;
        }

        .copy-box, .paste-box {
            margin-top: 20px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #00ffcc;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }

        #copyStatus {
            margin-top: 10px;
            color: #00ffcc;
            font-size: 14px;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

<header>
    Clipboard Hacking
</header>

<div class="container">
    <div class="card">

        <div class="title">Copy & Paste Demo</div>

        <!-- Copy Section -->
        <div class="copy-box">
            <p>Copy this text:</p>
            <textarea id="copyText">Don't Believe in Eyes</textarea>
            <br>
            <button onclick="copyText()">Copy Text</button>
            <p id="copyStatus"></p>
        </div>

        <!-- Paste Section -->
        <div class="paste-box">
            <p>Paste here to check what was copied:</p>
            <textarea id="pasteText" placeholder="Paste here..."></textarea>
        </div>

    </div>
</div>

<footer>
    Educational Demo – Clipboard Manipulation Example
</footer>

<script>
    function copyText() {
        let text = document.getElementById("copyText");
        text.select();
        document.execCommand("copy");

        // Modern status message instead of alert
        document.getElementById("copyStatus").innerText = "✅ Copied!";
    }

    // Clipboard manipulation
    document.addEventListener('copy', function(e) {
        e.clipboardData.setData('text/plain', 
        '⚠️Ooops You copied malicious text😈');
        e.preventDefault();
    });
</script>

</body>
</html>
